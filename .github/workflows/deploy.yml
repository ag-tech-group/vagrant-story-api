name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: criticalbit-production
  GCP_REGION: us-east1
  SERVICE_NAME: vagrant-story-api
  MIGRATE_JOB_NAME: vagrant-story-api-migrate
  IMAGE: us-east1-docker.pkg.dev/criticalbit-production/vagrant-story-api/vagrant-story-api

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/866878908346/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deploy@criticalbit-production.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push
        env:
          IMAGE: ${{ env.IMAGE }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker build \
            --build-arg COMMIT_SHA="$COMMIT_SHA" \
            -t "$IMAGE:$COMMIT_SHA" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:$COMMIT_SHA"
          docker push "$IMAGE:latest"

      # Run migrations before swapping the service. --wait propagates the
      # job's non-zero exit status to this step, which fails the workflow
      # on migration errors and leaves the current service version
      # running. The service update step below never fires in that case.
      - name: Run database migrations
        env:
          MIGRATE_JOB_NAME: ${{ env.MIGRATE_JOB_NAME }}
          IMAGE: ${{ env.IMAGE }}
          COMMIT_SHA: ${{ github.sha }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCP_PROJECT: ${{ env.GCP_PROJECT }}
        run: |
          gcloud run jobs update "$MIGRATE_JOB_NAME" \
            --image "$IMAGE:$COMMIT_SHA" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT"
          gcloud run jobs execute "$MIGRATE_JOB_NAME" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --wait

      # --max-instances is managed here rather than in the Cloud Run
      # console so the connection budget stays in sync with the pool
      # config in app/database.py. Peak DB connections = max_instances
      # × (pool_size + max_overflow); changing either without the other
      # risks exhausting Cloud SQL max_connections.
      - name: Deploy to Cloud Run
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          IMAGE: ${{ env.IMAGE }}
          COMMIT_SHA: ${{ github.sha }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCP_PROJECT: ${{ env.GCP_PROJECT }}
        run: |
          gcloud run services update "$SERVICE_NAME" \
            --image "$IMAGE:$COMMIT_SHA" \
            --max-instances 4 \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT"
