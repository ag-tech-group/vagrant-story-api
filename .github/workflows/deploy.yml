name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: criticalbit-production
  GCP_REGION: us-east1
  SERVICE_NAME: vagrant-story-api
  IMAGE: us-east1-docker.pkg.dev/criticalbit-production/vagrant-story-api/vagrant-story-api

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/866878908346/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deploy@criticalbit-production.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push
        env:
          IMAGE: ${{ env.IMAGE }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker build \
            --build-arg COMMIT_SHA="$COMMIT_SHA" \
            -t "$IMAGE:$COMMIT_SHA" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:$COMMIT_SHA"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }}
